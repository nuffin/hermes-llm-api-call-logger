name: llm-api-call-logger
version: 1.1.0
description: "Log every LLM API call with full details — input/output tokens, tool calls, raw response, profile, workspace, worker, task. Data dir configurable via observability.default.data_dir or observability.llm-api-call-logger.data_dir in Hermes config.yaml."
author: "Hauzer S. Lee"
hooks:
  - post_api_request
